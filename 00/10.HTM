「春を探す？？相変わらずよぅわからんことやってんなぁ･･･。」
<Br>
「さくら、とってもきれいだね。」
<Br>
「･･･あぁ、そうやな。」
<Br>
しばらく、しばらくいなりちゃんと一緒に眺めたよ。
<Br>
とっても綺麗な春を眺めたよ
<Br>
風がそよそよキモチイイの。
<Br><Br>
「おや？みみちゃんじゃないですか。」
<Br>
「あ！おじいちゃん！」
<Br>
しばらくしたら、後ろから声掛けられた。
<Br>
みみこのとってもとっても大好きな、お寺の住職のおじいちゃん。
<Br>
「いい春は、見つけられましたかな？」
<Br>
「うん！とってもいい春、見つけたよ！」
