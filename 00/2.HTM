<Td>
朝起きたら、
<Br>
いつもみみこと一緒に寝てるお寺の住職のおじいちゃんが居なかった。
<Br>
みーたしかいなかった。
<Br>
枕もとを見たら手紙が１通あったから、読んでみた。
<Br>
おじいちゃんからの手紙だったよ。
<Br><Br>
『みみちゃんへ。
<Br>
今日わたしは急な用事ができたので、
<Br>
隣町の幼馴染のおばあさんの家まで行ってきます。
<Br>
今日はとても暖かくて、いいお天気です。
<Br>
いつものようにお寺の境内の掃除を終えたら､
<Br>
春を探しに出かけてみてはいかがですか？』
<Br><Br>
みみこ、境内のお掃除済ませたら、春を探しに行くことにしたよ！
